<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Property Photos</title>

	<link rel="stylesheet"
		 href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

	<style>
		body {
			background: #f4f6f8;
			padding: 2rem;
			font-family: system-ui, sans-serif;
		}

		.card-shell {
			border-radius: 16px;
			box-shadow: 0 10px 24px rgba(0,0,0,.08);
			border: 0;
			overflow: hidden;
			background: #fff;
		}

		.hero-wrap {
			position: relative;
			background: #0b0f14;
		}

		.hero-img {
			width: 100%;
			height: clamp(320px, 55vh, 560px);
			object-fit: contain;
			display: block;
			background: #0b0f14;
		}

		.hero-controls {
			position: absolute;
			inset: 0;
			pointer-events: none;
		}

		.nav-btn {
			pointer-events: auto;
			position: absolute;
			top: 50%;
			transform: translateY(-50%);
			border: 0;
			border-radius: 999px;
			width: 44px;
			height: 44px;
			background: rgba(255,255,255,.85);
			display: grid;
			place-items: center;
			box-shadow: 0 6px 18px rgba(0,0,0,.2);
		}

			.nav-btn:hover {
				background: rgba(255,255,255,.95);
			}

			.nav-btn:active {
				transform: translateY(-50%) scale(.98);
			}

		.nav-prev {
			left: 12px;
		}

		.nav-next {
			right: 12px;
		}

		.counter-pill {
			position: absolute;
			right: 12px;
			bottom: 12px;
			background: rgba(0,0,0,.55);
			color: #fff;
			padding: 6px 10px;
			border-radius: 999px;
			font-size: .9rem;
			backdrop-filter: blur(6px);
			pointer-events: none;
		}

		.thumb-strip {
			display: flex;
			gap: 10px;
			overflow-x: auto;
			padding: 12px;
			background: #fff;
			border-top: 1px solid rgba(0,0,0,.06);
			scroll-behavior: smooth;
		}

			.thumb-strip::-webkit-scrollbar {
				height: 10px;
			}

			.thumb-strip::-webkit-scrollbar-thumb {
				background: rgba(0,0,0,.15);
				border-radius: 999px;
			}

		.thumb {
			flex: 0 0 auto;
			width: 96px;
			height: 72px;
			border-radius: 12px;
			overflow: hidden;
			cursor: pointer;
			border: 2px solid transparent;
			box-shadow: 0 6px 16px rgba(0,0,0,.08);
			background: #e9eef3;
		}

			.thumb img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
				transform: scale(1.02);
			}

			.thumb.active {
				border-color: #0d6efd;
				box-shadow: 0 10px 22px rgba(13,110,253,.25);
			}

		.status {
			padding: 14px 16px;
			color: #6c757d;
		}

		.input-group {
			max-width: 520px;
			margin: 0 auto;
		}
	</style>
</head>

<body>
	<div class="container">
		<h2 class="text-center mb-3">🏡 Property Photo Viewer</h2>

		<div class="input-group mb-4">
			<input id="parcelInput" type="text" class="form-control"
				  placeholder="Enter parcel number (no dashes)" />
			<button class="btn btn-primary" id="loadPhotosBtn">Load Photos</button>
		</div>

		<div id="galleryCard" class="card card-shell d-none">
			<div class="hero-wrap">
				<img id="heroImg" class="hero-img" alt="Selected property photo" />
				<div class="hero-controls">
					<button class="nav-btn nav-prev" id="prevBtn" aria-label="Previous">
						‹
					</button>
					<button class="nav-btn nav-next" id="nextBtn" aria-label="Next">
						›
					</button>
					<div class="counter-pill" id="counterPill">1 / 1</div>
				</div>
			</div>

			<div class="thumb-strip" id="thumbStrip"></div>
		</div>

		<div id="emptyState" class="text-center status d-none">
			No photos available for this parcel.
		</div>
	</div>

	<script>
		const btn=document.getElementById("loadPhotosBtn");
		const parcelInput=document.getElementById("parcelInput");

		const galleryCard=document.getElementById("galleryCard");
		const emptyState=document.getElementById("emptyState");

		const heroImg=document.getElementById("heroImg");
		const thumbStrip=document.getElementById("thumbStrip");

		const prevBtn=document.getElementById("prevBtn");
		const nextBtn=document.getElementById("nextBtn");
		const counterPill=document.getElementById("counterPill");

		let urls=[];
		let index=0;

		function setActive(i)
		{
			if(!urls.length) return;
			index=(i+urls.length)%urls.length;

			heroImg.src=urls[index];
			counterPill.textContent=`${index+1} / ${urls.length}`;

			// highlight active thumbnail + scroll into view
			[...thumbStrip.children].forEach((el,idx) =>
			{
				el.classList.toggle("active",idx===index);
				if(idx===index) el.scrollIntoView({ behavior: "smooth",inline: "center",block: "nearest" });
			});
		}

		function buildThumbs()
		{
			thumbStrip.innerHTML="";
			urls.forEach((url,i) =>
			{
				const t=document.createElement("div");
				t.className="thumb"+(i===0? " active":"");
				t.innerHTML=`<img src="${url}" alt="Thumbnail ${i+1}">`;
				t.addEventListener("click",() => setActive(i));
				thumbStrip.appendChild(t);
			});
		}

		async function loadPhotos()
		{
			const pid=parcelInput.value.trim();
			if(!pid) return alert("Enter a parcel number (no dashes).");

			emptyState.classList.add("d-none");
			galleryCard.classList.add("d-none");
			heroImg.removeAttribute("src");
			thumbStrip.innerHTML="";

			const resp=await fetch(`/api/tyler/parcel/${pid}/photos`,{ cache: "no-store" });
			if(!resp.ok)
			{
				emptyState.textContent=`Error loading photos (HTTP ${resp.status}).`;
				emptyState.classList.remove("d-none");
				return;
			}

			const data=await resp.json();
			urls=Array.isArray(data.urls)? data.urls:[];

			if(urls.length===0)
			{
				emptyState.textContent="No photos available for this parcel.";
				emptyState.classList.remove("d-none");
				return;
			}

			galleryCard.classList.remove("d-none");
			buildThumbs();
			setActive(0);
		}

		btn.addEventListener("click",loadPhotos);
		parcelInput.addEventListener("keydown",(e) =>
		{
			if(e.key==="Enter") loadPhotos();
		});

		prevBtn.addEventListener("click",() => setActive(index-1));
		nextBtn.addEventListener("click",() => setActive(index+1));

		// keyboard navigation (when page is focused)
		window.addEventListener("keydown",(e) =>
		{
			if(galleryCard.classList.contains("d-none")) return;
			if(e.key==="ArrowLeft") setActive(index-1);
			if(e.key==="ArrowRight") setActive(index+1);
		});
	</script>
</body>
</html>
